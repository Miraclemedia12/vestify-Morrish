<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vestify – Access Your Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --gold-glow: #ffed4e;
            --bg: #07020d;
            --dark: #040108;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 215, 0, 0.15);
            --text: #ffffff;
            --text-light: rgba(255, 255, 255, 0.75);
            --gradient-gold: linear-gradient(90deg, rgba(207, 162, 53, 1) 0%, rgba(255, 255, 255, 1) 29%, rgba(207, 162, 53, 1) 67%, rgba(255, 255, 255, 1) 100%);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }
        /* Floating Orbs */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.08), transparent);
            animation: float 35s infinite linear;
            opacity: 0.3;
        }
        .orb:nth-child(1) { width: 500px; height: 500px; top: -10%; left: -15%; animation-duration: 25s; }
        .orb:nth-child(2) { width: 600px; height: 600px; bottom: -15%; right: -15%; animation-duration: 35s; }
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(60px, -40px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* Login Card Container */
        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 35px rgba(255,215,0,0.05);
            position: relative;
            z-index: 10;
        }

        /* Logo Area */
        .logo-area {
            text-align: center;
            margin-bottom: 35px;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            background: var(--gradient-gold);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #000;
            font-weight: 800;
            box-shadow: 0 0 25px rgba(255,215,0,0.35);
            margin-bottom: 16px;
        }
        .brand-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .brand-name span {
            color: var(--gold);
        }
        .subtitle {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-top: 6px;
        }

        /* Input Styles */
        .form-group {
            position: relative;
            margin-bottom: 24px;
        }
        .form-group i.input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.1rem;
            transition: var(--transition);
        }
        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 16px;
            padding: 18px 20px 18px 50px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }
        .form-input:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }
        .form-input:focus + i.input-icon {
            color: var(--gold);
        }

        /* Password Show/Hide Toggle */
        .toggle-password {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255, 255, 255, 0.4);
            transition: var(--transition);
        }
        .toggle-password:hover {
            color: var(--gold);
        }

        /* Submit Button */
        .login-btn {
            background: var(--gradient-gold);
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255,215,0,0.3);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 30px;
        }
        .login-btn:hover {
            box-shadow: 0 0 40px rgba(255,215,0,0.5);
            transform: translateY(-2px);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Extra Links */
        .extra-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }
        .extra-links a {
            color: var(--text-light);
            text-decoration: none;
            transition: var(--transition);
        }
        .extra-links a:hover {
            color: var(--gold);
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(7,2,13,0.96);
            backdrop-filter: blur(15px);
            border: 1px solid var(--gold);
            border-radius: 50px;
            padding: 14px 28px;
            color: var(--text);
            font-weight: 500;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            z-index: 4000;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 215, 0, 0.2);
        }
        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-orbs">
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="login-container">
        <!-- Logo Header -->
        <div class="logo-area">
            <div class="logo-icon">V</div>
            <div class="brand-name">Vest<span>ify</span></div>
            <p class="subtitle">Secure login portal</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <!-- Email -->
            <div class="form-group">
                <input type="email" id="email" class="form-input" placeholder="Your account email" required autocomplete="email">
                <i class="fas fa-envelope input-icon"></i>
            </div>

            <!-- Password -->
            <div class="form-group">
                <input type="password" id="password" class="form-input" placeholder="Your password" required autocomplete="current-password">
                <i class="fas fa-lock input-icon"></i>
                <i class="fas fa-eye toggle-password" id="eyeToggle"></i>
            </div>

            <!-- Action Button -->
            <button type="submit" class="login-btn" id="submitBtn">
                <span>Secure Sign In</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="extra-links">
            <a href="#">Forgot Password?</a>
            <a href="#" style="color: var(--gold);">Create Account</a>
        </div>
    </div>

    <!-- Toast UI Element -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle" id="toastIcon"></i>
        <span id="toastMessage"></span>
    </div>

    <!-- Firebase Legacy SDKs (Matches Dashboard structure perfectly) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Use your exactly identical configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDB-5gCKldlrQVIfE7raHWRAVGar8BijCw",
            authDomain: "vestify-morrish.firebaseapp.com",
            projectId: "vestify-morrish",
            storageBucket: "vestify-morrish.firebasestorage.app",
            messagingSenderId: "312167700760",
            appId: "1:312167700760:web:3dd4521601ca370d8ba66d",
            measurementId: "G-FC6L1N4T6H"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const rtdb = firebase.database();

        // Show password toggle logic
        const passwordInput = document.getElementById('password');
        const eyeToggle = document.getElementById('eyeToggle');
        
        eyeToggle.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeToggle.className = 'fas fa-eye-slash toggle-password';
            } else {
                passwordInput.type = 'password';
                eyeToggle.className = 'fas fa-eye toggle-password';
            }
        });

        // Toast Alert System
        function showToast(msg, isSuccess = true) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            document.getElementById('toastMessage').textContent = msg;
            
            if (isSuccess) {
                icon.className = "fas fa-check-circle";
                toast.style.borderColor = "var(--gold)";
            } else {
                icon.className = "fas fa-circle-exclamation";
                toast.style.borderColor = "#ff4d4d";
            }
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // Login Submission and Sync Logic
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showToast("Please fill in all inputs", false);
                return;
            }

            // Disable buttons during process
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span>Signing in...</span> <i class="fas fa-spinner fa-spin"></i>`;

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    showToast("Authentication success! Fetching profile data...", true);

                    // Fetch user details from Firestore database
                    db.collection('users').doc(user.uid).get()
                        .then((doc) => {
                            let userData = {};
                            if (doc.exists) {
                                userData = doc.data();
                                handleSuccessRedirect(user, userData);
                            } else {
                                // Fallback to Realtime Database
                                fetchRTDBFallback(user);
                            }
                        })
                        .catch(() => {
                            // Fallback directly to Realtime Database if Firestore access fails
                            fetchRTDBFallback(user);
                        });
                })
                .catch((error) => {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<span>Secure Sign In</span> <i class="fas fa-arrow-right"></i>`;
                    
                    // Direct and friendly error handling
                    let errMsg = error.message;
                    if (error.code === 'auth/wrong-password') errMsg = "Incorrect password. Please try again.";
                    if (error.code === 'auth/user-not-found') errMsg = "Account not found. Verify email.";
                    if (error.code === 'auth/invalid-email') errMsg = "Please enter a valid email address.";
                    
                    showToast(errMsg, false);
                });
        });

        // Sync backup from Realtime Database
        function fetchRTDBFallback(user) {
            rtdb.ref('users/' + user.uid).once('value')
                .then((snapshot) => {
                    const userData = snapshot.exists() ? snapshot.val() : {};
                    handleSuccessRedirect(user, userData);
                })
                .catch(() => {
                    // Safe UI default in case the account is brand new or lacks database entries
                    handleSuccessRedirect(user, {});
                });
        }

        // Write to local storage dynamically and route smoothly
        function handleSuccessRedirect(user, userData) {
            const vestifyUserData = {
                uid: user.uid,
                email: user.email,
                username: userData.username || user.email.split('@')[0],
                package: userData.package || '',
                packagePrice: userData.packagePrice || '0',
                packageBonus: userData.packageBonus || '0'
            };

            // Save object cleanly in storage so dashboard loads it instantly
            localStorage.setItem('vestifyUser', JSON.stringify(vestifyUserData));
            
            showToast("Redirecting to dashboard...", true);
            
            // Redirect smoothly to your main file path after a brief pause
            setTimeout(() => {
                window.location.href = "dashboard.html"; // Change this if your dashboard file has a different name
            }, 1200);
        }
    </script>
</body>
</html>
