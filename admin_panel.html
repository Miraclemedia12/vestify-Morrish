<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vestify Vault – Control Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --gold-glow: #ffed4e;
            --bg: #07020d;
            --dark: #040108;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 215, 0, 0.15);
            --text: #ffffff;
            --text-light: rgba(255, 255, 255, 0.7);
            --gradient-gold: linear-gradient(90deg, rgba(207, 162, 53, 1) 0%, rgba(255, 255, 255, 1) 29%, rgba(207, 162, 53, 1) 67%, rgba(255, 255, 255, 1) 100%);
            --success: #00ff9d;
            --danger: #ff4d4d;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating Animated Orbs */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.06), transparent);
            animation: float 40s infinite linear;
            opacity: 0.3;
        }
        .orb:nth-child(1) { width: 500px; height: 500px; top: -10%; left: -15%; }
        .orb:nth-child(2) { width: 600px; height: 600px; bottom: -10%; right: -15%; animation-duration: 50s; }
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(50px, -30px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* Login Authentication Wall UI */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
            padding: 20px;
            transition: var(--transition);
        }
        .login-overlay.hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1.5px solid var(--glass-border);
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 30px rgba(255, 215, 0, 0.1);
        }
        .login-logo {
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
            position: relative;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            opacity: 0.7;
        }
        .form-control {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            padding: 14px 16px 14px 45px;
            border-radius: 14px;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            transition: var(--transition);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(255,215,0,0.15);
        }

        /* Main Dashboard Core Layout */
        .dashboard-wrapper {
            display: none;
            flex-direction: column;
            min-height: 100vh;
        }
        .dashboard-wrapper.active {
            display: flex;
        }

        /* Top Bar Header */
        .admin-header {
            padding: 20px 40px;
            background: rgba(7, 2, 13, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .admin-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .admin-brand h2 {
            font-size: 1.4rem;
            color: var(--gold);
            font-weight: 700;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logout-btn:hover {
            background: rgba(255, 77, 77, 0.1);
            transform: translateY(-2px);
        }

        /* Workspace View Content */
        .admin-main {
            padding: 40px;
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        /* Live Registration Overview Metrics Summary Row */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
        }
        .metric-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 26px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        .metric-info h3 {
            font-size: 0.9rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .metric-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(255,215,0,0.15);
        }
        .metric-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            background: rgba(255,215,0,0.05);
            border: 1px solid rgba(255,215,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: var(--gold);
        }

        /* Columns Split Panel Layout */
        .content-split {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
        }
        @media (max-width: 992px) {
            .content-split { grid-template-columns: 1fr; }
            .admin-header { padding: 20px; }
            .admin-main { padding: 20px; }
        }

        .panel-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .panel-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
        }

        /* Action Form Elements styling */
        .btn-primary {
            background: var(--gradient-gold);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255,215,0,0.2);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:hover {
            box-shadow: 0 5px 30px rgba(255,215,0,0.4);
            transform: translateY(-2px);
        }

        /* Real-Time User Log Tables & Rows styling */
        .registration-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 480px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .registration-list::-webkit-scrollbar {
            width: 6px;
        }
        .registration-list::-webkit-scrollbar-thumb {
            background: rgba(255,215,0,0.2);
            border-radius: 10px;
        }
        .user-row {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }
        .user-row:hover {
            border-color: rgba(255,215,0,0.2);
            background: rgba(255, 215, 0, 0.02);
        }
        .user-details h4 {
            font-size: 0.95rem;
            color: #fff;
            font-weight: 600;
        }
        .user-details p {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 2px;
        }
        .badge-package {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.2);
            color: var(--gold-glow);
            letter-spacing: 0.5px;
        }

        /* UI Notification Toast Element */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(7,2,13,0.96);
            backdrop-filter: blur(15px);
            border: 1px solid var(--gold);
            border-radius: 16px;
            padding: 16px 25px;
            color: var(--text);
            font-weight: 500;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: var(--transition);
            z-index: 6000;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="bg-orbs">
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- Login Auth Interface Gateway Block -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-shield-halved"></i></div>
            <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 6px;">Staff Authentication</h2>
            <p style="font-size: 0.88rem; color: var(--text-light); margin-bottom: 30px;">Access restricted to authorized platform administrators only.</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Admin User ID</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-tie"></i>
                        <input type="text" id="adminUser" class="form-control" placeholder="Enter username" required autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label>Security Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" id="adminPass" class="form-control" placeholder="Enter password" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">
                    <i class="fas fa-unlock-keyhole"></i> Unlock Console
                </button>
            </form>
        </div>
    </div>

    <!-- Authorized Operations Control Dashboard view -->
    <div class="dashboard-wrapper" id="dashboardWrapper">
        <header class="admin-header">
            <div class="admin-brand">
                <div class="metric-icon" style="width:40px; height:40px; border-radius:10px; font-size:1.1rem;">
                    <i class="fas fa-terminal"></i>
                </div>
                <h2>Vestify Control Dashboard</h2>
            </div>
            <button class="logout-btn" id="btnLogout">
                <i class="fas fa-power-off"></i> Terminate Session
            </button>
        </header>

        <main class="admin-main">
            <!-- Analytics Metrics Block View Summary Counters -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-info">
                        <h3>Total Registered Members</h3>
                        <div class="metric-value" id="countTotalUsers">0</div>
                    </div>
                    <div class="metric-icon"><i class="fas fa-users"></i></div>
                </div>
                <div class="metric-card">
                    <div class="metric-info">
                        <h3>New Registrations (Today)</h3>
                        <div class="metric-value" id="countNewUsers">0</div>
                    </div>
                    <div class="metric-icon"><i class="fas fa-user-plus"></i></div>
                </div>
            </div>

            <!-- Double Column Management Operation split row panel view -->
            <div class="content-split">
                <!-- Left: Control Form for Gateway parameters -->
                <div class="panel-card">
                    <h3 class="panel-title"><i class="fas fa-money-check-dollar"></i> Global Settlement Settings</h3>
                    <form id="paymentConfigForm">
                        <div class="form-group">
                            <label>Settlement Bank Name</label>
                            <div class="input-wrapper">
                                <i class="fas fa-building-columns" style="left:16px;"></i>
                                <input type="text" id="cfgBankName" class="form-control" style="padding-left:45px;" placeholder="e.g. Moniepoint MFB, OPay" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Beneficiary Account Number</label>
                            <div class="input-wrapper">
                                <i class="fas fa-hashtag" style="left:16px;"></i>
                                <input type="text" id="cfgAccNumber" class="form-control" style="padding-left:45px;" placeholder="10-digit account code" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Beneficiary Account Name</label>
                            <div class="input-wrapper">
                                <i class="fas fa-id-card" style="left:16px;"></i>
                                <input type="text" id="cfgAccName" class="form-control" style="padding-left:45px;" placeholder="Corporate or personal full title" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Secure Telegram Verification Redirect Link</label>
                            <div class="input-wrapper">
                                <i class="fab fa-telegram" style="left:16px;"></i>
                                <input type="url" id="cfgTelegramLink" class="form-control" style="padding-left:45px;" placeholder="https://t.me/your_channel" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary" style="margin-top: 15px;">
                            <i class="fas fa-cloud-arrow-up"></i> Update Payment Matrix Instantly
                        </button>
                    </form>
                </div>

                <!-- Right: Live Registration Log Monitor Tracking View -->
                <div class="panel-card">
                    <h3 class="panel-title"><i class="fas fa-clock-rotate-left"></i> Realtime User Registration Stream</h3>
                    <div class="registration-list" id="registrationList">
                        <!-- Instantly synced document elements populate internally inside here -->
                        <div style="text-align:center; padding: 40px 0; color:var(--text-light);">
                            <i class="fas fa-circle-notch fa-spin" style="font-size: 1.5rem; margin-bottom: 10px; color:var(--gold);"></i>
                            <p style="font-size: 0.9rem;">Streaming registration matrices...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Admin Operations Alerts Toast Notification System Container -->
    <div class="toast" id="adminToast">
        <i class="fas fa-check-circle" id="toastIcon"></i>
        <span id="toastMessage"></span>
    </div>

    <!-- Firebase System SDK dependencies initialized perfectly matching specifications -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // Exact active Firebase database project structure parameters[cite: 1]
        const firebaseConfig = {
            apiKey: "AIzaSyDB-5gCKldlrQVIfE7raHWRAVGar8BijCw",
            authDomain: "vestify-morrish.firebaseapp.com",
            projectId: "vestify-morrish",
            storageBucket: "vestify-morrish.firebasestorage.app",
            messagingSenderId: "312167700760",
            appId: "1:312167700760:web:3dd4521601ca370d8ba66d",
            measurementId: "G-FC6L1N4T6H"
        };

        // Initialize Firebase services Connection matrix
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. Session Access State Control Walls and Variables Engine
        const loginOverlay = document.getElementById('loginOverlay');
        const dashboardWrapper = document.getElementById('dashboardWrapper');

        // Simple cryptographic vault flag protection check loop
        if (sessionStorage.getItem('vestifyAdminActive') === 'authorized') {
            displayDashboardView();
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('adminUser').value.trim();
            const p = document.getElementById('adminPass').value.trim();

            // Set your secure username and password right below!
            if (u === 'admin' && p === 'Vestify2026!') {
                sessionStorage.setItem('vestifyAdminActive', 'authorized');
                showNoticeToast("Control Console unlocked successfully.");
                displayDashboardView();
            } else {
                showNoticeToast("Invalid admin ID credentials input details.", false);
            }
        });

        document.getElementById('btnLogout').addEventListener('click', () => {
            sessionStorage.removeItem('vestifyAdminActive');
            showNoticeToast("Session secure channel terminated.");
            setTimeout(() => {
                window.location.reload();
            }, 800);
        });

        function displayDashboardView() {
            loginOverlay.classList.add('hidden');
            dashboardWrapper.classList.add('active');
            initializeAdminSystemListeners();
        }

        // 2. Alert Notice Messages Toast System Output Engine Logic
        function showNoticeToast(message, isSuccess = true) {
            const toast = document.getElementById('adminToast');
            const icon = document.getElementById('toastIcon');
            document.getElementById('toastMessage').textContent = message;
            
            if (isSuccess) {
                icon.className = "fas fa-circle-check";
                toast.style.borderColor = "var(--gold)";
                icon.style.color = "var(--gold)";
            } else {
                icon.className = "fas fa-triangle-exclamation";
                toast.style.borderColor = "var(--danger)";
                icon.style.color = "var(--danger)";
            }
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 3. Main Data Orchestration Listener Function Loops
        function initializeAdminSystemListeners() {
            // A. Instantly read existing global settings parameters right into the configuration input blocks
            db.collection('admin').doc('paymentSettings').get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('cfgBankName').value = data.bankName || '';
                    document.getElementById('cfgAccNumber').value = data.accountNumber || '';
                    document.getElementById('cfgAccName').value = data.accountName || '';
                    document.getElementById('cfgTelegramLink').value = data.telegramLink || '';
                }
            }).catch(err => console.error("Error pulling database state profile fields:", err));

            // B. Live registration user matrix count tracker stream logic
            db.collection('users').onSnapshot((snapshot) => {
                // Renders precise active structural array elements tracking metrics counters
                const totalCount = snapshot.size;
                document.getElementById('countTotalUsers').textContent = totalCount;
                
                // Track dynamic user item details for lists
                const listContainer = document.getElementById('registrationList');
                if(totalCount === 0) {
                    listContainer.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-light); font-size:0.9rem;">No dynamic accounts profiles discovered inside database.</div>`;
                    return;
                }
                
                listContainer.innerHTML = '';
                let todayNewCounter = 0;
                
                // Get absolute current local standard string layout for monitoring registrations timeline
                const todayString = new Date().toDateString();

                snapshot.forEach((doc) => {
                    const user = doc.data();
                    
                    // Simple programmatic validation tracking dynamic metrics for users matching timeline context elements
                    if (user.signupDate) {
                        const checkDate = new Date(user.signupDate).toDateString();
                        if (checkDate === todayString) todayNewCounter++;
                    } else {
                        // Safe layout fallback option
                        todayNewCounter++;
                    }

                    const nameText = user.username || 'Anonymous User';
                    const emailText = user.email || 'No email specified';
                    const matchedPackName = user.package ? user.package.toUpperCase() : 'FREE PLAN';

                    const row = document.createElement('div');
                    row.className = 'user-row';
                    row.innerHTML = `
                        <div class="user-details">
                            <h4>${nameText}</h4>
                            <p>${emailText}</p>
                        </div>
                        <span class="badge-package">${matchedPackName}</span>
                    `;
                    listContainer.appendChild(row);
                });

                document.getElementById('countNewUsers').textContent = todayNewCounter;
            }, (error) => {
                console.error("Stream tracking runtime intercept failure:", error);
            });
        }

        // 4. Update Event Hook to Push form matrix properties into Firestore database records instantly
        document.getElementById('paymentConfigForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const updatedBank = document.getElementById('cfgBankName').value.trim();
            const updatedAccNum = document.getElementById('cfgAccNumber').value.trim();
            const updatedAccName = document.getElementById('cfgAccName').value.trim();
            const updatedTeleLink = document.getElementById('cfgTelegramLink').value.trim();

            db.collection('admin').doc('paymentSettings').set({
                bankName: updatedBank,
                accountNumber: updatedAccNum,
                accountName: updatedAccName,
                telegramLink: updatedTeleLink
            }, { merge: true })
            .then(() => {
                showNoticeToast("Payment records synchronized perfectly across nodes!");
            })
            .catch((err) => {
                console.error("Write execution error block dropped:", err);
                showNoticeToast("Database mutation write process rejected.", false);
            });
        });
    </script>
</body>
</html>
